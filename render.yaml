services:
  - type: web
    name: orientation-portal
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: DATA_DIR
        value: /opt/render/project/src/data
